services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: aiquant
      POSTGRES_USER: aiquant
      POSTGRES_PASSWORD: aiquant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://aiquant:aiquant@postgres:5432/aiquant
      CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:

